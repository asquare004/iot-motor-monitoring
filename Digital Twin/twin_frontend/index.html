<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Digital Twin</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #f3f6fb;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }
      canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
      }
      #hud {
        position: fixed;
        left: 16px;
        top: 44px;
        z-index: 10;
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(30, 34, 40, 0.8);
        color: #fff;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.1);
        white-space: pre;
        font-size: 14px;
        line-height: 1.35;
        backdrop-filter: blur(6px);
        max-width: 520px;
      }
      @media screen and (max-width: 600px) {
        #hud {
          font-size: 8px;
          max-width: 20vw;
          max-height: 30vh;
        }
        
      }
      #err {
        position: fixed;
        left: 16px;
        bottom: 16px;
        z-index: 20;
        padding: 12px 14px;
        border-radius: 10px;
        background: rgba(140, 20, 20, 0.92);
        color: #fff;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.12);
        white-space: pre-wrap;
        font-size: 13px;
        line-height: 1.35;
        max-width: 80vw;
        display: none;
      }

      #alertBar {
        position: absolute;
        top: 0;
        left: 20;
        width: 100%;
        background: #d32f2f;
        color: white;
        font-weight: bold;
        font-size: 18px;
        text-align: center;
        padding: 10px;
        display: none;
        animation: alertFlash 1s infinite;
        z-index: 11;
      }

      @keyframes alertFlash {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="alertBar">⚠ MACHINE STOPPING REQUIRED</div>
    <div id="hud">loading...</div>
    <div id="err"></div>

    <!-- three.js global build -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/OrbitControls.js"></script> -->
    <!-- your app -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
        }
      }
    </script>
    <script>
      const machine_id = "{{machine_id}}";
    </script>
    <script type="module" src="/static/twin.js"></script>
  </body>
</html>
